tags:
  - Element instances
  - Variables
summary: Set element variables
description: >
  Sets or deletes variables of an active element instance.


  A variable's BPMN element ID can be used to determine at which scope an element variable should be set or deleted.
  It could be the element instance itself, the direct or an indirect parent element instance.
  If not specified, a variable is set or deleted at the scope of element instance itself.
parameters:
  - in: path
    name: partition
    description: Element instance partition.
    required: true
    schema:
      type: string
      format: date
  - in: path
    name: id
    description: Element instance ID.
    required: true
    schema:
      type: integer
      format: int32
      min: 1
requestBody:
  content:
    application/json:
      schema:
        $ref: "#/components/schemas/SetElementVariablesCmd"
      examples:
        set_variables:
          summary: Set variables
          value:
            variables:
              - name: a
                data:
                  encoding: "json"
                  encrypted: true
                  value: "{...}"
              - bpmnElementId: x
                name: c
                data:
                  encoding: "json"
                  encrypted: true
                  value: "{...}"
            workerId: go-bpmn
        delete_variables:
          summary: Delete variables
          value:
            variables:
              - name: b
                data: null
              - bpmnElementId: x
                name: d
                data: null
            workerId: go-bpmn
responses:
  "204":
    description: Element variables set or deleted
  "400":
    description: Bad request
    content:
      application/problem+json:
        schema:
          $ref: "#/components/schemas/Problem"
        example:
          status: 400
          type: HTTP_REQUEST_BODY
          title: invalid request body
          detail: failed to validate request body
          errors:
            - pointer: "#/variables/,"
              type: variable_name
              detail: must match regex ^[a-zA-Z0-9_-]+$
              value: ","
            - pointer: "#/variables/,/encoding"
              type: required
              detail: is required
            - pointer: "#/variables/,/value"
              type: required
              detail: is required
  "404":
    description: Not found
    content:
      application/problem+json:
        schema:
          $ref: "#/components/schemas/Problem"
        examples:
          element_instance_not_found:
            summary: Element instance not found
            value:
              status: 404
              type: NOT_FOUND
              title: failed to set element variables
              detail: element instance 2025-04-01/123 could not be found
  "409":
    description: Conflict
    content:
      application/problem+json:
        schema:
          $ref: "#/components/schemas/Problem"
        examples:
          process_instance_ended:
            summary: Process instance ended
            value:
              status: 409
              type: CONFLICT
              title: failed to set element variables
              detail: process instance 2025-04-01/935 is ended
          element_instance_ended:
            summary: Element instance ended
            value:
              status: 409
              type: CONFLICT
              title: failed to set element variables
              detail: element instance 2025-04-01/724 is ended
